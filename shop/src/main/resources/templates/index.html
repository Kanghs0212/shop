<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metato - 쇼핑몰</title>
    <link href="/main.css" rel="stylesheet">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>

<div th:replace="~{ nav.html::navbar }"></div>
<div th:replace="~{ nav.html::welcome }"></div>

<div class="best-selling">
    <h2>가장 많이 팔리는 옷</h2>
    <div class="product-list">
        <div class="product" th:each="item: ${items}" th:onclick="'location.href=\'/detail/' + ${item.id} + '?pageNum=1\''">
            <img th:if="${item.getImgUrl!=''}" th:src="@{${item.getImgUrl}}" alt="상품 이미지">
            <img th:if="${item.getImgUrl==''}" src="https://placehold.co/300" alt="상품 이미지">
            <h3 th:text="${item.getTitle}">상품명</h3>
            <p th:text="${item.getText}">상품 설명</p>
            <div th:text="'₩'+${item.getPrice}" class="price">가격</div>
        </div>
        <div class="look">
            <a href="/list/page/1">더 둘러보기</a>
        </div>
    </div>
</div>

<div th:replace="~{ footer.html::footer }"></div>

</body>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const logoutElement = document.getElementById('logout');
        if (logoutElement) {
            logoutElement.onclick = function() {
                const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
                const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
                fetch('/logout_jwt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', [csrfHeader]: csrfToken },
                }).then(response => { if (response.ok) window.location.href = '/login'; });
            };
        }
    });
</script>
</html>
