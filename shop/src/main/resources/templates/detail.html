<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상품 상세 - Metato</title>
    <link href="/main.css" rel="stylesheet">
    <style>
        .detail-wrapper {
            max-width: 900px;
            margin: 40px auto;
            padding: 32px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
            display: flex;
            gap: 40px;
        }
        .detail-image {
            flex: 0 0 360px;
        }
        .detail-image img {
            width: 100%;
            height: auto;
            border-radius: 16px;
            object-fit: cover;
        }
        .detail-info {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .detail-info h3 {
            font-size: 24px;
            font-weight: 700;
            color: #1d1d1f;
            margin: 0 0 8px;
        }
        .detail-info .detail-desc {
            color: #86868b;
            font-size: 15px;
            margin-bottom: 12px;
        }
        .detail-info .detail-price {
            font-size: 28px;
            font-weight: 700;
            color: #0071e3;
            margin-bottom: 24px;
        }
        .detail-actions {
            display: flex;
            gap: 12px;
            padding-bottom: 24px;
            border-bottom: 1px solid #e5e5e7;
            margin-bottom: 24px;
            align-items: center;
        }
        .detail-actions input[type="number"] {
            width: 80px;
            text-align: center;
        }
        .review-section {
            max-width: 900px;
            margin: 32px auto;
            padding: 32px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
        }
        .review-section h3 {
            font-size: 20px;
            font-weight: 700;
            color: #1d1d1f;
            margin-bottom: 20px;
            text-align: center;
        }
        .review-item {
            padding: 16px;
            border-bottom: 1px solid #f0f0f0;
        }
        .review-item:last-child {
            border-bottom: none;
        }
        .review-item .review-author {
            font-weight: 600;
            font-size: 14px;
            color: #1d1d1f;
        }
        .review-item .review-content {
            color: #424245;
            font-size: 14px;
            margin: 8px 0;
        }
        .star-rating {
            unicode-bidi: bidi-override;
            direction: rtl;
            text-align: left;
            margin-bottom: 8px;
        }
        .star-rating > span {
            display: inline-block;
            position: relative;
            width: 1.1em;
            cursor: pointer;
        }
        .star-rating > span::before {
            content: "☆";
            position: absolute;
            left: 0;
            color: #d2d2d7;
        }
        .star-rating > span.filled::before {
            content: "★";
            color: #f5a623;
        }
        .review-form {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e5e5e7;
        }
        .review-form textarea {
            width: 100%;
            height: 80px;
            resize: none;
            margin-bottom: 12px;
        }
        .review-form-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
    </style>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>
<div th:replace="~{ nav.html::navbar }"></div>

<div class="detail-wrapper">
    <div class="detail-image">
        <img th:if="${item.getImgUrl != ''}" th:src="@{${item.getImgUrl}}" alt="상품 이미지">
        <img th:if="${item.getImgUrl == ''}" src="https://placehold.co/400" alt="대체 이미지">
    </div>
    <div class="detail-info">
        <h3 th:text="${item.getTitle}">상품명</h3>
        <p class="detail-desc" th:text="${item.getText}">상품 설명</p>
        <p class="detail-price" th:text="${item.getPrice + '원'}">가격</p>

        <form sec:authorize="isAuthenticated()" method="POST">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="id" th:value="${item.getId}">
            <input type="hidden" name="title" th:value="${item.getTitle}">
            <input type="hidden" name="price" th:value="${item.getPrice}">
            <div class="detail-actions">
                <input type="number" min="0" name="orderCount" placeholder="수량" value="1">
                <button formaction="/order" type="submit" class="order-button">주문하기</button>
                <button formaction="/cart" type="submit" class="order-button" style="background:#424245;">장바구니</button>
            </div>
        </form>
    </div>
</div>

<div class="review-section">
    <h3>리뷰</h3>
    <div th:each="text : ${texts}" class="review-item">
        <span class="review-author" th:text="'작성자: ' + ${text.username}">작성자</span>
        <div class="star-rating" style="display:inline-block; margin-left:12px;">
            <span th:each="star, iterStat : ${#numbers.sequence(1, 5)}"
                  th:class="${text.rating >= iterStat.index + 1} ? 'filled' : ''"></span>
        </div>
        <p class="review-content" th:text="${text.content}">리뷰 내용</p>
    </div>

    <form sec:authorize="isAuthenticated()" method="POST" action="/comment" class="review-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" name="id" th:value="${item.getId}">
        <textarea name="commentInput" placeholder="리뷰를 작성해주세요"></textarea>
        <div class="review-form-actions">
            <label style="font-size:14px; font-weight:500; color:#86868b;">별점</label>
            <select name="rating" style="border-radius:10px; padding:8px 16px;">
                <option value="5">5</option>
                <option value="4">4</option>
                <option value="3">3</option>
                <option value="2">2</option>
                <option value="1">1</option>
            </select>
            <button type="submit">리뷰 등록</button>
        </div>
    </form>
</div>

<div th:if="cnt!=null" style="text-align:center; margin: 24px 0;">
    <span th:if="${cnt > 0}" th:each="i: ${#numbers.sequence(1, cnt)}">
        <a th:if="${i == cnt_now}" th:text="${i}" class="page-btn blue" th:href="@{/detail/{id}(id=${item.id},pageNum=${i})}"></a>
        <a th:if="${i!=cnt_now}" th:text="${i}" class="page-btn white" th:href="@{/detail/{id}(id=${item.id},pageNum=${i})}"></a>
    </span>
</div>

<div th:replace="~{ footer.html::footer }"></div>
</body>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const logoutElement = document.getElementById('logout');
        if (logoutElement) {
            logoutElement.onclick = function() {
                const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
                const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
                fetch('/logout_jwt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', [csrfHeader]: csrfToken },
                }).then(response => { if (response.ok) window.location.href = '/login'; });
            };
        }
    });
</script>
</html>
