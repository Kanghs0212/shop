<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장바구니 - Metato</title>
    <link href="/main.css" rel="stylesheet">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <style>
        .cart-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 32px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
        }
        .cart-container h2 {
            font-size: 24px;
            font-weight: 700;
            color: #1d1d1f;
            margin-bottom: 24px;
            text-align: center;
        }
        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-bottom: 1px solid #f0f0f0;
        }
        .cart-item:last-of-type {
            border-bottom: none;
        }
        .cart-item-info h4 {
            margin: 0 0 4px;
            font-size: 16px;
            font-weight: 600;
            color: #1d1d1f;
        }
        .cart-item-info p {
            margin: 0;
            font-size: 14px;
            color: #86868b;
        }
        .cart-item-price {
            font-size: 16px;
            font-weight: 700;
            color: #0071e3;
            margin-right: 16px;
        }
        .cart-item-remove button {
            background: #ff3b30;
            color: #fff;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
        }
        .cart-item-remove button:hover {
            background: #d63027;
        }
        .cart-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 16px 0;
            border-top: 2px solid #e5e5e7;
            margin-top: 16px;
        }
        .cart-total span {
            font-size: 20px;
            font-weight: 700;
            color: #1d1d1f;
        }
        .cart-total .total-price {
            color: #0071e3;
        }
        .cart-actions {
            text-align: center;
            margin-top: 24px;
        }
        .cart-actions button {
            padding: 14px 48px;
            font-size: 16px;
            border-radius: 12px;
        }
        .cart-empty {
            text-align: center;
            padding: 48px 0;
            color: #86868b;
            font-size: 16px;
        }
        .cart-empty a {
            color: #0071e3;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div th:replace="~{ nav.html::navbar }"></div>

<div class="cart-container">
    <h2>장바구니</h2>

    <div th:if="${#lists.isEmpty(cartItems)}" class="cart-empty">
        <p>장바구니가 비어있습니다.</p>
        <a href="/list/page/1">쇼핑하러 가기</a>
    </div>

    <div th:if="${!#lists.isEmpty(cartItems)}">
        <div class="cart-item" th:each="item, stat : ${cartItems}">
            <div class="cart-item-info">
                <h4 th:text="${item.title}">상품명</h4>
                <p th:text="'수량: ' + ${item.count} + '개'">수량</p>
            </div>
            <span class="cart-item-price" th:text="'₩' + ${item.price * item.count}">가격</span>
            <div class="cart-item-remove">
                <form method="POST" action="/cart/remove" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="cartItemId" th:value="${item.id}">
                    <button type="submit">삭제</button>
                </form>
            </div>
        </div>

        <div class="cart-total">
            <span>합계</span>
            <span class="total-price" th:text="'₩' + ${totalPrice}">합계</span>
        </div>

        <div class="cart-actions">
            <form method="POST" action="/cart/order">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit">전체 주문하기</button>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{ footer.html::footer }"></div>
</body>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const logoutElement = document.getElementById('logout');
        if (logoutElement) {
            logoutElement.onclick = function() {
                const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
                const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
                fetch('/logout_jwt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', [csrfHeader]: csrfToken },
                }).then(response => { if (response.ok) window.location.href = '/login'; });
            };
        }
    });
</script>
</html>
