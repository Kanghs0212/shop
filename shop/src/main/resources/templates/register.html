<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - Metato</title>
    <link href="/main.css" rel="stylesheet">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>

<div th:replace="~{ nav.html::navbar }"></div>
<div th:replace="~{ nav.html::join }"></div>

<div class="register_container">
    <h2 style="text-align:center;">회원가입</h2>

    <div th:if="${error}" class="alert-error">
        <h4 th:text="${error}"></h4>
    </div>

    <div id="alertBox" class="alert-error" style="display:none;">
        <h4>모든 필수 입력 항목을 채워주세요.</h4>
    </div>

    <form method="POST" action="/member" onsubmit="return validateForm()">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div>
            <p>아이디</p>
            <input name="username" id="username" placeholder="4자 이상 입력해주세요">
        </div>

        <div class="twoInput">
            <div style="flex:1;">
                <p>비밀번호</p>
                <input name="password" type="password" id="password" placeholder="4자 이상 입력해주세요">
            </div>
            <div style="flex:1;">
                <p>비밀번호 확인</p>
                <input name="passwordCheck" type="password" id="passwordCheck" placeholder="비밀번호를 다시 입력해주세요">
            </div>
        </div>

        <div class="twoInput">
            <div style="flex:1;">
                <p>닉네임</p>
                <input name="displayName" id="displayName" placeholder="닉네임을 입력해주세요">
            </div>
            <div style="flex:1;">
                <p>이메일</p>
                <input name="email" type="email" id="email" placeholder="example@email.com">
            </div>
        </div>

        <h2 style="text-align:center; margin-top: 32px; font-size: 18px;">주소 입력</h2>

        <div class="twoInput">
            <div style="flex:1;">
                <input type="text" name="postcode" id="sample4_postcode" placeholder="우편번호">
            </div>
            <div style="flex:1;">
                <p></p>
                <input style="width:60%; cursor:pointer;" type="button" onclick="sample4_execDaumPostcode()" value="우편번호 찾기">
            </div>
        </div>

        <div>
            <input type="text" name="roadAddress" id="sample4_roadAddress" placeholder="도로명주소">
        </div>

        <div>
            <input type="text" name="jibun" id="sample4_jibunAddress" placeholder="지번주소">
            <span id="guide" style="color:#86868b;display:none;font-size:13px;"></span>
        </div>

        <p style="text-align:center; margin-top:16px; color:#86868b; font-size:13px;">선택 사항</p>

        <div class="twoInput">
            <div style="flex:1;">
                <input type="text" name="detailAddress" id="sample4_detailAddress" placeholder="상세주소">
            </div>
            <div style="flex:1;">
                <input type="text" name="extraAddress" id="sample4_extraAddress" placeholder="참고항목">
            </div>
        </div>

        <div style="text-align: center; margin-top: 24px;">
            <button type="submit" style="width:100%; padding:12px; font-size:16px; border-radius:12px;">회원가입</button>
        </div>

        <p style="text-align:center; margin-top:16px; font-size:14px; color:#86868b;">
            이미 계정이 있으신가요? <a href="/login" style="color:#0071e3; font-weight:600;">로그인</a>
        </p>
    </form>
</div>

<div th:replace="~{ footer.html::footer }"></div>
</body>

<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script>
    function sample4_execDaumPostcode() {
        new daum.Postcode({
            oncomplete: function(data) {
                var roadAddr = data.roadAddress;
                var extraRoadAddr = '';

                if(data.bname !== '' && /[동|로|가]$/g.test(data.bname)){
                    extraRoadAddr += data.bname;
                }
                if(data.buildingName !== '' && data.apartment === 'Y'){
                   extraRoadAddr += (extraRoadAddr !== '' ? ', ' + data.buildingName : data.buildingName);
                }
                if(extraRoadAddr !== ''){
                    extraRoadAddr = ' (' + extraRoadAddr + ')';
                }

                document.getElementById('sample4_postcode').value = data.zonecode;
                document.getElementById("sample4_roadAddress").value = roadAddr;
                document.getElementById("sample4_jibunAddress").value = data.jibunAddress;

                if(roadAddr !== ''){
                    document.getElementById("sample4_extraAddress").value = extraRoadAddr;
                } else {
                    document.getElementById("sample4_extraAddress").value = '';
                }

                var guideTextBox = document.getElementById("guide");
                if(data.autoRoadAddress) {
                    var expRoadAddr = data.autoRoadAddress + extraRoadAddr;
                    guideTextBox.innerHTML = '(예상 도로명 주소 : ' + expRoadAddr + ')';
                    guideTextBox.style.display = 'block';
                } else if(data.autoJibunAddress) {
                    var expJibunAddr = data.autoJibunAddress;
                    guideTextBox.innerHTML = '(예상 지번 주소 : ' + expJibunAddr + ')';
                    guideTextBox.style.display = 'block';
                } else {
                    guideTextBox.innerHTML = '';
                    guideTextBox.style.display = 'none';
                }
            }
        }).open();
    }
</script>
<script>
    function validateForm() {
       var username = document.getElementById('username').value.trim();
       var password = document.getElementById('password').value.trim();
       var passwordCheck = document.getElementById('passwordCheck').value.trim();
       var displayName = document.getElementById('displayName').value.trim();
       var email = document.getElementById('email').value.trim();
       var postcode = document.getElementById('sample4_postcode').value.trim();
       var roadAddress = document.getElementById('sample4_roadAddress').value.trim();
       var jibun = document.getElementById('sample4_jibunAddress').value.trim();

       if (!username || !password || !passwordCheck || !displayName || !email || !postcode || !roadAddress || !jibun) {
           document.getElementById('alertBox').style.display = 'block';
           return false;
       } else if(password != passwordCheck){
            document.getElementById('alertBox').innerHTML = '<h4>비밀번호가 일치하지 않습니다.</h4>';
            document.getElementById('alertBox').style.display = 'block';
            return false;
       } else {
           document.getElementById('alertBox').style.display = 'none';
           return true;
       }
   }

   document.addEventListener('DOMContentLoaded', function() {
       const logoutElement = document.getElementById('logout');
       if (logoutElement) {
           logoutElement.onclick = function() {
               const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
               const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
               fetch('/logout_jwt', {
                   method: 'POST',
                   headers: { 'Content-Type': 'application/json', [csrfHeader]: csrfToken },
               }).then(response => { if (response.ok) window.location.href = '/login'; });
           };
       }
   });
</script>
</html>
