<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상품 목록 - Metato</title>
    <link href="/main.css" rel="stylesheet">
    <link href="/listStyle.css" rel="stylesheet">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>
    <div th:replace="~{ nav.html::navbar }"></div>
    <div th:replace="~{ nav.html::welcome }"></div>

    <div class="container">
        <form action="/search" method="POST" style="margin-bottom:20px;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input name="searchText" placeholder="상품 검색" style="display:inline; width:300px;">
            <button type="submit">검색</button>
        </form>

        <div class="category-buttons">
            <button>전체</button>
            <button>상의</button>
            <button>하의</button>
            <button>양말</button>
        </div>

        <div class="products">
            <div class="product" th:each="item: ${items}" th:onclick="'location.href=\'/detail/' + ${item.id} + '?pageNum=1\''">
                <img th:if="${item.getImgUrl!=''}" th:src="@{${item.getImgUrl}}" alt="상품 이미지">
                <img th:if="${item.getImgUrl==''}" src="https://placehold.co/300" alt="상품 이미지">
                <div class="product-name" th:text="${item.title}">상품명</div>
                <div class="product-price" th:text="'₩' +${item.price}">가격</div>
            </div>
        </div>
    </div>

    <div th:if="cnt!=null" style="text-align:center; margin: 24px 0;">
        <span th:if="${cnt > 0}" th:each="i: ${#numbers.sequence(1, cnt)}">
            <a th:if="${i == cnt_now}" th:text="${i}" class="page-btn blue" th:href="@{/list/page/{i}(i=${i})}"></a>
            <a th:if="${i!=cnt_now}" th:text="${i}" class="page-btn white" th:href="@{/list/page/{i}(i=${i})}"></a>
        </span>
    </div>

    <div th:replace="~{ footer.html::footer }"></div>

    <script>
        document.querySelectorAll('.delete_btn').forEach(button => {
            button.addEventListener('click', function() {
                const itemId = button.getAttribute('data-id');
                const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
                const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
                fetch('/delete?id=' + encodeURIComponent(itemId), {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json', [csrfHeader]: csrfToken }
                }).then(response => response.text()).then(() => location.reload());
            });
        });

        document.addEventListener('DOMContentLoaded', function() {
            const logoutElement = document.getElementById('logout');
            if (logoutElement) {
                logoutElement.onclick = function() {
                    const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
                    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
                    fetch('/logout_jwt', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', [csrfHeader]: csrfToken },
                    }).then(response => { if (response.ok) window.location.href = '/login'; });
                };
            }
        });
    </script>
</body>
</html>
