<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상품 등록 - Metato</title>
    <link href="/main.css" rel="stylesheet">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>

<div th:replace="~{ nav.html::navbar }"></div>

<div class="write-container">
    <h1>상품 등록</h1>
    <form method="POST" action="/add" enctype="multipart/form-data">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input name="title" placeholder="상품 이름">
        <input name="price" placeholder="가격">
        <select name="category" style="width:100%; margin-bottom:12px;">
            <option value="상의">상의</option>
            <option value="하의">하의</option>
            <option value="양말">양말</option>
        </select>
        <textarea name="text" placeholder="부가 설명" style="height:100px; resize:none;"></textarea>
        <input type="file" name="imgFile" accept="image/*">
        <button type="submit">상품 등록</button>
    </form>
</div>

<div th:replace="~{ footer.html::footer }"></div>
</body>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const logoutElement = document.getElementById('logout');
        if (logoutElement) {
            logoutElement.onclick = function() {
                const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
                const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
                fetch('/logout_jwt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', [csrfHeader]: csrfToken },
                }).then(response => { if (response.ok) window.location.href = '/login'; });
            };
        }
    });
</script>
</html>
