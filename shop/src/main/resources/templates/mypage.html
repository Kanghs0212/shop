<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 - Metato</title>
    <link href="/main.css" rel="stylesheet">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>

<div th:replace="~{ nav.html::navbar }"></div>
<div th:replace="~{ nav.html::welcome }"></div>

<div class="mypage-container">
    <h3>마이페이지</h3>
    <div class="mypage-info" th:if="${member}">
        <div class="mypage-info-row">
            <span class="mypage-info-label">아이디</span>
            <span class="mypage-info-value" th:text="${member.username}"></span>
        </div>
        <div class="mypage-info-row">
            <span class="mypage-info-label">닉네임</span>
            <span class="mypage-info-value" th:text="${member.displayName}"></span>
        </div>
        <div class="mypage-info-row">
            <span class="mypage-info-label">이메일</span>
            <span class="mypage-info-value" th:text="${member.email}"></span>
        </div>
        <div class="mypage-info-row" th:if="${member.roadAddress != null && !member.roadAddress.isEmpty()}">
            <span class="mypage-info-label">주소</span>
            <span class="mypage-info-value" th:text="${member.roadAddress + ' ' + (member.detailAddress != null ? member.detailAddress : '')}"></span>
        </div>
    </div>
</div>

<div th:replace="~{ footer.html::footer }"></div>
</body>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const logoutElement = document.getElementById('logout');
        if (logoutElement) {
            logoutElement.onclick = function() {
                const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
                const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
                fetch('/logout_jwt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', [csrfHeader]: csrfToken },
                }).then(response => { if (response.ok) window.location.href = '/login'; });
            };
        }
    });
</script>
</html>
